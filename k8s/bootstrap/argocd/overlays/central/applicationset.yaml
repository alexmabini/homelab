apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: central-applications
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/alexmabini/homelab.git
        revision: HEAD
        directories:
          - path: k8s/bootstrap/**/overlays/central
  template:
    metadata:
      name: "{{path[2]}}"
    spec:
      project: bootstrap
      source:
        repoURL: https://github.com/alexmabini/homelab.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{path[2]}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
